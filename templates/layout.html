<!DOCTYPE html>
<html>
<head lang="en">
    <link rel="shortcut icon" href="/static/img/favicon2.ico">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <meta http-equiv="Expires" content="0" />
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="/static/css/basic.css">

    {% block customHead %}{% endblock %}
</head>
<body>
<div class="container">
    <div class="container-inner">

	    	<div class="two-columns"> <a class="force_reset" href="/"><img src="/static/img/logo.png" alt="Job"/></a></div>
	        <div class="two-columns infos">
	        		<span>Career Intelligence Platform</span>
                    <small>Taylor Lewis</small>
	        </div>
    	</div>
        <div class="omni-container">
            <div class="centralization">
        	{% block content %}{% endblock %}
                </div>
    	</div>
    </div>
</div>
{% block lightbox %}{% endblock %}

</html>
